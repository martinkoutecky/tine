name: Bug report
description: Something in Tine is broken or behaves differently from Logseq.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. A small reproducible example is the fastest route to
        a fix and becomes a permanent regression test. Please remove private names,
        URLs, and note content before attaching a graph. If the form does not fit,
        [open a blank issue](https://github.com/martinkoutecky/tine/issues/new).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you did and what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?
      description: If it differs from Logseq, say so — Tine aims to match Logseq by default.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Exact steps to reproduce
      description: Start from opening Tine and list the shortest sequence that reliably shows the problem.
      placeholder: |
        1. Open page …
        2. Click …
        3. Press …
    validations:
      required: true
  - type: textarea
    id: sample-graph
    attributes:
      label: Minimal anonymized sample graph
      description: |
        Drag a small .zip here containing only the files needed to reproduce the
        bug. Replace private page names, URLs, and content first. If a graph cannot
        be shared or the bug happens in every graph, say that explicitly and give
        the smallest block text that reproduces it.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tine version
      description: From the Releases page / the title bar / `tine --version`.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Android
        - Other
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - Linux AppImage
        - Linux .deb
        - Linux .rpm
        - macOS .dmg
        - Windows .exe
        - Android .apk
        - Built from source
        - Other
    validations:
      required: false
  - type: textarea
    id: debug-log
    attributes:
      label: Debug log
      description: |
        For startup/crash problems especially: run `TINE_DEBUG=1 tine` (or
        `tine --debug`), reproduce, and paste the log it prints the path to
        (defaults to `/tmp/tine-debug.log`). It records startup diagnostics only —
        no note content.
      render: text
    validations:
      required: false
