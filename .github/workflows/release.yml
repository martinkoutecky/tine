# Build Tine for Linux, macOS, and Windows and attach the installers to a
# GitHub release. Dormant until the repo lives on GitHub and you push a tag:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# (or run it manually from the Actions tab). macOS/Windows builds are unsigned;
# add signing secrets later for notarized/SmartScreen-clean installers.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: macos-latest
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tine ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install Tine."
          releaseDraft: true
          prerelease: false
