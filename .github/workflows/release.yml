# Build Tine installers for Linux, macOS (universal), and Windows and publish them
# to a GitHub Release. Triggered by pushing a version tag:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# …or run it manually from the Actions tab (workflow_dispatch) to smoke-test the
# build matrix WITHOUT cutting a release. Both paths fail before packaging unless
# the exact candidate SHA already has a successful manually dispatched full CI.
#
# Publication is atomic at the workflow level: every expensive build writes only
# an immutable workflow artifact; one assembler creates latest.json; and one
# short publisher owns the draft, uploads, remote verification, and publication.
# A platform failure must never expose a partial release (v0.5.5 did exactly that).
#
# Signing: macOS/Windows installers are UNSIGNED until you add the secrets noted
# below. Unsigned builds still run, but Gatekeeper (macOS) and SmartScreen
# (Windows) warn the user. See the comments on the signing env vars.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cheap deterministic guards run before any expensive release build.
  # The same workflow also calls the real offline Flatpak build below; together
  # these prevent dependency-pin drift from surfacing only after a tag is public.
  preflight:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Require exact-SHA full CI evidence
        env:
          GH_TOKEN: ${{ github.token }}
          CI_EVIDENCE_SHA: ${{ github.sha }}
          CI_EVIDENCE_REPOSITORY: ${{ github.repository }}
        run: node scripts/check-ci-evidence.mjs
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: npm ci
      - name: Require updater signing key
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for release smoke and tagged releases."
            exit 1
          fi
      - name: Version, Android code, tag, and changelog agree
        env:
          REQUIRE_RELEASE_READINESS: "1"
        run: node scripts/check-release-preflight.mjs
      - name: Flatpak offline npm sources are current
        run: node scripts/check-flatpak-node-sources.mjs
      - name: Flatpak offline Cargo sources are current
        run: node scripts/check-flatpak-cargo-sources.mjs
      - name: lsdoc WASM pin is current
        run: node scripts/check-wasm-pin.mjs
      - name: lsdoc oracle bytes and cross-platform EOL policy are current
        run: node scripts/check-lsdoc-oracle-sync.mjs
      - name: Release pipeline contract fixtures
        run: node scripts/test-release-pipeline.mjs

  # Reuse the actual privileged, network-disabled Flatpak bundle build. It runs
  # in parallel with the platform packages but is a hard publication dependency.
  flatpak:
    needs: preflight
    uses: ./.github/workflows/flatpak.yml

  # Build each desktop platform concurrently. Jobs never mutate a GitHub Release;
  # they upload immutable workflow artifacts for the assembler/publisher below.
  build:
    needs: preflight
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - platform: ubuntu-22.04
            lane: linux-x64
            args: "--features custom-protocol"
            rust-targets: ""
          # Linux ARM64: built NATIVELY on GitHub's aarch64 runner (free on public
          # repos). No cross-compile — GTK/WebKitGTK are system libs that are
          # painful to cross-compile, so we install the arm64 -dev packages on the
          # arm runner exactly like the x86 job. Audience: Asahi (fine) + Pi/SBC
          # (will feel WebKitGTK's paint cost). Ships .deb + raw binary (AppImage
          # tooling on ARM is historically flaky, so it's fine if that bundle is skipped).
          - platform: ubuntu-22.04-arm
            lane: linux-arm64
            args: "--features custom-protocol"
            rust-targets: ""
          - platform: macos-latest
            lane: macos-universal
            # one universal binary that runs on both Apple Silicon and Intel
            args: "--target universal-apple-darwin --features custom-protocol"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            lane: windows-x64
            args: "--features custom-protocol"
            rust-targets: ""
            win-arch: x64
            win-exe-dir: target/release
          # Windows ARM64 (Surface Pro X, Snapdragon X laptops): CROSS-compiled from
          # the x86_64 windows runner. rustup adds the target; the VS 2022 ARM64 MSVC
          # tools are preinstalled on the windows-latest image. A `--target <triple>`
          # build outputs under target/<triple>/release/ (NOT target/release/), which
          # `win-exe-dir` below threads into the portable-zip step. WebView2 exists on
          # Windows ARM64, so the runtime is fine.
          - platform: windows-latest
            lane: windows-arm64
            args: "--target aarch64-pc-windows-msvc --features custom-protocol"
            rust-targets: "aarch64-pc-windows-msvc"
            win-arch: arm64
            win-exe-dir: target/aarch64-pc-windows-msvc/release
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf \
            build-essential curl wget file libssl-dev libxdo-dev \
            webkit2gtk-driver xvfb xauth xdotool openbox x11-utils weston

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          # Cargo workspace is the repo ROOT (target/ lives there, not src-tauri/)
          workspaces: ". -> target"

      - run: npm ci

      - name: Install Linux release-suite browser
        if: matrix.lane == 'linux-x64'
        run: npx playwright install --with-deps chromium

      - name: Build signed Tauri bundles
        env:
          # Updater signing (minisign) — the app-update root of trust, SEPARATE from
          # OS code-signing. REQUIRED once `bundle.createUpdaterArtifacts` is true:
          # the bundler signs each updater artifact with this key, and the installed
          # app verifies against `plugins.updater.pubkey` in tauri.conf.json. Add the
          # two repo secrets (see docs/adr/0011) BEFORE tagging the next release, or
          # the signing step fails. Empty ⇒ signing skipped (fine only while no
          # updater artifacts are produced).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS/Windows builds are UNSIGNED for now (that's OS code-signing, not
          # the updater key above). Do NOT set the APPLE_* signing env vars here
          # while the secrets are empty — the macOS bundler can interpret an empty
          # APPLE_CERTIFICATE as "signing requested" and fail on `security import`.
          # To enable notarized macOS builds later, add these repo secrets AND
          # re-add the matching env lines:
          #   APPLE_CERTIFICATE (base64 .p12), APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID.
        run: npm run tauri build -- ${{ matrix.args }}

      # Portable Windows build: the compiled Tauri exe is already self-contained
      # (frontend + lsdoc-wasm are embedded; WebView2Loader is statically linked),
      # so "portable" is just that one exe, zipped. The NSIS installer we also
      # ship wraps this same binary; the portable zip skips the installer AND its
      # WebView2 bootstrapper — WebView2 is preinstalled on Windows 10/11, so this
      # runs for ~everyone, but a machine without the runtime won't launch it.
      - name: Package portable Windows zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = node -p "require('./src-tauri/tauri.conf.json').version"
          # A cross-target build (ARM64) outputs under target/<triple>/release/, a
          # native build (x64) under target/release/ — matrix.win-exe-dir carries the
          # right one. Tauri v2 may rename the main binary to productName ("Tine.exe");
          # the cargo bin name is "tine.exe". Pick whichever exists — and NOT the
          # secondary "tine-check.exe" helper binary.
          $dir = "${{ matrix.win-exe-dir }}"
          $exe = @("$dir/Tine.exe", "$dir/tine.exe") |
            Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) { throw "portable: main Tine exe not found under $dir" }
          $zip = "Tine_${version}_${{ matrix.win-arch }}-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zip -Force

      # The expensive Linux build above is also the exact binary under test and
      # is a hard publication gate. Windows advisory evidence runs independently
      # from the staged portable artifact below so it cannot serialize assembly.
      - name: Install Tauri WebDriver bridge
        if: matrix.lane == 'linux-x64'
        run: cargo install tauri-driver --locked

      - name: Gate Linux x64 on the complete real-app regression catalog
        if: matrix.lane == 'linux-x64'
        env:
          E2E_ALLOW_SYNTHETIC_FOCUS: "1"
        run: npm run e2e:linux:release

      - name: Upload release E2E evidence
        if: always() && matrix.lane == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-${{ matrix.lane }}
          path: test-results/e2e
          if-no-files-found: warn
          retention-days: 14

      # The staged Windows smoke jobs verify that the downloaded portable exe
      # embeds this exact production frontend.  Preserve the already-built dist
      # once instead of rebuilding it independently in every advisory job.
      - name: Upload exact Windows x64 frontend proof
        if: matrix.lane == 'windows-x64'
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-frontend-windows-x64
          path: dist
          if-no-files-found: error
          retention-days: 3

      - name: Stage immutable release artifact
        run: node scripts/stage-release-lane.mjs "${{ matrix.lane }}" release-candidate "${{ github.sha }}"

      - name: Upload release lane
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.lane }}
          path: release-candidate/${{ matrix.lane }}
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  # Advisory Windows scenarios consume the already-staged portable x64 binary.
  # They run on independent hosts and in parallel with candidate assembly, so a
  # bad runner neither cascades into 0/N evidence nor delays atomic publication.
  # Job-level continue-on-error keeps the advisory policy while leaving each
  # scenario's real failure visible instead of turning one 0/N step green.
  windows-smoke:
    needs: [preflight, build]
    # A failure in another build-matrix lane (for example the hard Linux E2E
    # gate) must not suppress evidence from an already-staged Windows x64 app.
    # If x64 itself failed, the artifact download below fails visibly instead.
    if: ${{ always() && needs.preflight.result == 'success' && needs.build.result != 'cancelled' }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - windows-core
          - og-parity-references
          - page-properties
          - page-trailing-block
          - pdf-logseq
          - print-security
          - tab-overflow
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: release-windows-x64
          path: release-windows-x64
      - name: Download the exact embedded frontend proof
        uses: actions/download-artifact@v4
        with:
          name: release-e2e-frontend-windows-x64
          path: dist
      - name: Extract the exact staged portable app
        shell: pwsh
        run: |
          $zip = Get-ChildItem release-windows-x64 -Filter '*-portable.zip' | Select-Object -First 1
          if (-not $zip) { throw "staged Windows portable zip is missing" }
          Expand-Archive $zip.FullName -DestinationPath "$env:RUNNER_TEMP\tine-portable" -Force
          $exe = Get-ChildItem "$env:RUNNER_TEMP\tine-portable" -Filter '*.exe' | Select-Object -First 1
          if (-not $exe) { throw "portable Tine executable is missing" }
          "TINE_APP=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install Edge WebDriver matching the hosted browser
        shell: pwsh
        run: |
          $edgeExe = "${env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe"
          if (-not (Test-Path $edgeExe)) { throw "Microsoft Edge not found at $edgeExe" }
          $version = (Get-Item $edgeExe).VersionInfo.ProductVersion
          $driverDir = "$env:RUNNER_TEMP\edgedriver"
          $zip = "$env:RUNNER_TEMP\edgedriver.zip"
          Invoke-WebRequest "https://msedgedriver.microsoft.com/$version/edgedriver_win64.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath $driverDir -Force
          $driverDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$driverDir\msedgedriver.exe" --version
      - name: Run advisory Windows x64 real-app scenario
        run: npm run e2e:windows:smoke -- --scenario=${{ matrix.scenario }}
      - name: Upload Windows E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-e2e-windows-x64-${{ matrix.scenario }}
          path: test-results/e2e/windows-smoke
          if-no-files-found: warn
          retention-days: 14

  # Android builds concurrently and contributes another immutable workflow
  # artifact. Signed Android output is mandatory for every release smoke/tag.
  #     The private signing key lives ONLY in encrypted repo secrets — never in the
  #     repo or on a build host (see docs/ANDROID-RELEASE.md). Add these once, on the
  #     machine that holds the .jks (Settings → Secrets, or `gh secret set`):
  #       ANDROID_KEYSTORE_BASE64    base64 of the .jks   (`base64 -w0 tine-release.jks`)
  #       ANDROID_KEYSTORE_PASSWORD  keystore password
  #       ANDROID_KEY_ALIAS          key alias (e.g. tine)
  #       ANDROID_KEY_PASSWORD       key password
  android:
    needs: preflight
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # secrets can't be used in a job-level `if:`, so gate every real step on this.
      # `secrets.X != ''` evaluates to a boolean without ever printing the secret.
      - name: Detect signing secret
        id: sign
        run: echo "enabled=${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}" >> "$GITHUB_OUTPUT"

      - name: Require Android signing
        if: steps.sign.outputs.enabled != 'true'
        run: |
          echo "::error::ANDROID_KEYSTORE_BASE64 is required for release smoke and tagged releases."
          exit 1

      - uses: actions/setup-java@v4
        if: steps.sign.outputs.enabled == 'true'
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        if: steps.sign.outputs.enabled == 'true'
        with:
          node-version: 20
          cache: npm

      # Pinned to match the F-Droid build recipe EXACTLY (metadata/page.tine.app.yml
      # uses `rustup default 1.96.0`). Reproducible builds require the developer's
      # APK and F-Droid's rebuild to use the same compiler, so this must not drift
      # to `stable`. Bump both together.
      - uses: dtolnay/rust-toolchain@1.96.0
        if: steps.sign.outputs.enabled == 'true'
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        if: steps.sign.outputs.enabled == 'true'
        with:
          workspaces: ". -> target"

      # Match the local toolchain exactly (compileSdk 36; NDK 26.3.11579264).
      - name: Install Android SDK packages
        if: steps.sign.outputs.enabled == 'true'
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "platforms;android-35" \
            "build-tools;35.0.0" "ndk;26.3.11579264" "platform-tools" >/dev/null
          NDK="$ANDROID_SDK_ROOT/ndk/26.3.11579264"
          # Point EVERY NDK env var at 26.3 — incl. ANDROID_NDK_LATEST_HOME, which the
          # runner presets to a newer preinstalled NDK. Without this override, the
          # Android build linked with that newer NDK's clang/lld 21 instead of 26.3's
          # clang/lld 17, which is what F-Droid's recipe (`ndk: 26.3.11579264`) uses —
          # different linker ⇒ different .so layout ⇒ reproducibility verify fails.
          for v in NDK_HOME ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK_LATEST_HOME; do
            echo "$v=$NDK" >> "$GITHUB_ENV"
          done
          # Env vars alone are NOT enough: the .so is linked by the tauri CLI (gradle's
          # RustPlugin shells out to `tauri android build`), which resolved a NEWER
          # preinstalled NDK's clang/lld 21 despite the env pin. Delete every other NDK
          # so 26.3 is the ONLY one anything can find — exactly the local (clang 17)
          # condition. With ndkVersion pinned in app/build.gradle.kts, AGP won't
          # re-download its default.
          find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d ! -name "26.3.11579264" -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$ANDROID_SDK_ROOT/ndk-bundle" 2>/dev/null || true
          echo "NDKs remaining on runner:"; ls "$ANDROID_SDK_ROOT/ndk"
          # Fail loudly if 26.3's clang isn't the one that'll be used.
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version | head -1

      - name: Install JS deps
        if: steps.sign.outputs.enabled == 'true'
        run: npm ci

      # Decode the keystore + write the gitignored signing config the Gradle build
      # reads. Both are removed in the final step regardless of outcome.
      - name: Write signing config from secrets
        if: steps.sign.outputs.enabled == 'true'
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/tine-release.jks"
          {
            echo "storeFile=$RUNNER_TEMP/tine-release.jks"
            echo "storePassword=$KS_PASS"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASS"
          } > src-tauri/gen/android/keystore.properties

      # Stamp the APK's versionName/versionCode from tauri.conf.json so a version
      # bump always reaches the Android build (tauri.properties is autogenerated;
      # this makes the result deterministic regardless of whether the CLI resyncs
      # it). versionCode uses tauri's scheme: major*1e6 + minor*1e3 + patch.
      - name: Sync Android version from tauri.conf.json
        if: steps.sign.outputs.enabled == 'true'
        run: |
          v=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS=. read -r MA MI PA <<< "$v"
          code=$(( 10#$MA * 1000000 + 10#$MI * 1000 + 10#$PA ))
          printf '// THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY.\ntauri.android.versionName=%s\ntauri.android.versionCode=%s\n' "$v" "$code" \
            > src-tauri/gen/android/app/tauri.properties
          echo "Android version → $v (code $code)"

      # The desktop/Flatpak identifier is page.tine.Tine (Flathub forbids IDs ending
      # in .app), but Android deliberately keeps applicationId page.tine.app to protect
      # the F-Droid listing + installed users. `tauri android build` derives the Java
      # package path from tauri.conf.json's `identifier`, and the committed gen/android
      # project is page.tine.app — so with the desktop id in place the build looks for
      # java/page/tine/Tine and fails ("Project directory … does not exist"). Pin the
      # identifier back to page.tine.app for the Android build only (ephemeral checkout;
      # desktop jobs are unaffected). This is exactly how it built pre-rename (v0.5.0).
      - name: Pin Android identifier to page.tine.app
        if: steps.sign.outputs.enabled == 'true'
        run: |
          node -e "const f='./src-tauri/tauri.conf.json',c=require(f);c.identifier='page.tine.app';require('fs').writeFileSync(f,JSON.stringify(c,null,2)+'\n');"
          echo "Android identifier → $(node -p "require('./src-tauri/tauri.conf.json').identifier")"

      - name: Build signed Android APK
        if: steps.sign.outputs.enabled == 'true'
        # Reproducible build (F-Droid #reproducible): canonicalize build-location paths
        # so the native lib's module-id hash matches F-Droid's rebuild regardless of
        # where each ran. Must stay identical to the RUSTFLAGS in the F-Droid recipe
        # (metadata/page.tine.app.yml). Paired with codegen-units=1 (Cargo.toml) and the
        # commit-time __BUILD_TIME__ (vite.config.ts).
        run: |
          export RUSTFLAGS="--remap-path-prefix=$GITHUB_WORKSPACE=/build --remap-path-prefix=$HOME/.cargo=/cargo"
          npx tauri android build --target aarch64 --apk

      - name: Prepare canonical Android APK
        if: steps.sign.outputs.enabled == 'true'
        run: |
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          # The signed artifact is app-universal-release.apk (the unsigned build
          # would end in -release-unsigned.apk, which this glob excludes).
          apk=$(find src-tauri/gen/android -path '*/release/*' -name '*-release.apk' | head -1)
          if [ -z "$apk" ]; then echo "no signed APK found"; exit 1; fi
          cp "$apk" "Tine_${version}_android-arm64.apk"

      - name: Stage immutable Android artifact
        if: steps.sign.outputs.enabled == 'true'
        run: node scripts/stage-release-lane.mjs android release-candidate "${{ github.sha }}"

      - name: Upload Android release lane
        if: steps.sign.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release-candidate/android
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

      - name: Remove signing material
        if: always()
        run: rm -f "$RUNNER_TEMP/tine-release.jks" src-tauri/gen/android/keystore.properties

  # Merge immutable lane artifacts and generate latest.json exactly once. Manual
  # dispatch stops after uploading this verified candidate and never touches a
  # GitHub Release.
  assemble:
    needs: [preflight, flatpak, build, android]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-input
      - name: Assemble and verify complete candidate
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/assemble-release-candidate.mjs release-input release-candidate-assembled
      - name: Upload verified release candidate
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate
          path: release-candidate-assembled
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  # The sole release writer. Expensive builds have already finished; this job
  # creates/reuses a draft, uploads distinct assets, uploads latest.json last,
  # re-downloads and verifies the draft, then publishes it.
  publish-release:
    needs: assemble
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: release-candidate
      - name: Upload, verify, and publish complete release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-release-candidate.mjs "${{ github.ref_name }}" release-candidate
