# Build Tine installers for Linux, macOS (universal), and Windows and publish them
# to a GitHub Release. Triggered by pushing a version tag:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# …or run it manually from the Actions tab (workflow_dispatch) to smoke-test the
# build matrix WITHOUT cutting a release.
#
# Auto-publish: create-release makes a DRAFT, then each build/android leg flips it
# to PUBLISHED the moment its own assets are uploaded — so installers drop as they
# are generated instead of all waiting for the slowest platform. With max-parallel:1
# the first finished leg publishes and the rest just add their assets to the now-
# public release. A run where every leg fails never reaches the publish step, so a
# totally-failed build still stays an unpublished draft (left for inspection).
#
# Signing: macOS/Windows installers are UNSIGNED until you add the secrets noted
# below. Unsigned builds still run, but Gatekeeper (macOS) and SmartScreen
# (Windows) warn the user. See the comments on the signing env vars.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

jobs:
  # 1) Create the (draft) release once, up front, and hand its id to the matrix.
  #    Only on a tag push — a manual dispatch skips this and just builds (below).
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      # Checkout so the step can read CHANGELOG.md for the release notes.
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            const fallback = 'Download an installer for your platform below. Windows and Linux ship both x64 and ARM64 builds (match your CPU). Windows users who prefer no installer can grab the portable `Tine_*-portable.zip` for their arch — unzip and run the exe (needs the WebView2 runtime, preinstalled on Windows 10/11). macOS/Windows builds are currently unsigned (right-click → Open on macOS; More info → Run anyway on Windows). On macOS, if Tine keeps asking to access your Documents folder on launch, see the [workaround](https://github.com/martinkoutecky/tine/blob/master/README.md#macos-repeated-documents-permission-prompt).';
            // Pull THIS version's section out of CHANGELOG.md so the GitHub release
            // notes match the changelog: everything between `## [x.y.z]` and the
            // next version heading (or the trailing link-reference block).
            let notes = '';
            try {
              const lines = fs.readFileSync('CHANGELOG.md', 'utf8').split('\n');
              const start = lines.findIndex((l) => l.startsWith(`## [${version}]`));
              if (start !== -1) {
                let end = lines.length;
                for (let i = start + 1; i < lines.length; i++) {
                  if (lines[i].startsWith('## [') || /^\[[^\]]+\]:\s/.test(lines[i])) { end = i; break; }
                }
                notes = lines.slice(start + 1, end).join('\n').trim();
              }
            } catch (e) {}
            const body = notes ? `${notes}\n\n---\n\n${fallback}` : fallback;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Tine ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # 2) Build each platform and upload its installer to the draft release. On a
  #    manual dispatch create-release is skipped, releaseId is empty, and
  #    tauri-action builds without uploading (a pure smoke test).
  build:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      # Serialize the platform legs. tauri-action's latest.json upload is a
      # read-modify-write merge (read the release's current latest.json → add this
      # platform → delete + re-upload). Run in parallel, the legs race: they lose
      # each other's platform entries AND collide on the re-upload
      # (ReleaseAsset "already_exists"), which fails a leg and skips publish-release
      # (v0.4.5 got stuck as a draft this way). One-at-a-time makes each leg merge
      # into the previous complete manifest. Cost: slower releases; fine for the
      # cadence, and correctness of the updater manifest matters more.
      max-parallel: 1
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--features custom-protocol"
            rust-targets: ""
          # Linux ARM64: built NATIVELY on GitHub's aarch64 runner (free on public
          # repos). No cross-compile — GTK/WebKitGTK are system libs that are
          # painful to cross-compile, so we install the arm64 -dev packages on the
          # arm runner exactly like the x86 job. Audience: Asahi (fine) + Pi/SBC
          # (will feel WebKitGTK's paint cost). Ships .deb + raw binary (AppImage
          # tooling on ARM is historically flaky, so it's fine if that bundle is skipped).
          - platform: ubuntu-22.04-arm
            args: "--features custom-protocol"
            rust-targets: ""
          - platform: macos-latest
            # one universal binary that runs on both Apple Silicon and Intel
            args: "--target universal-apple-darwin --features custom-protocol"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: "--features custom-protocol"
            rust-targets: ""
            win-arch: x64
            win-exe-dir: target/release
          # Windows ARM64 (Surface Pro X, Snapdragon X laptops): CROSS-compiled from
          # the x86_64 windows runner. rustup adds the target; the VS 2022 ARM64 MSVC
          # tools are preinstalled on the windows-latest image. A `--target <triple>`
          # build outputs under target/<triple>/release/ (NOT target/release/), which
          # `win-exe-dir` below threads into the portable-zip step. WebView2 exists on
          # Windows ARM64, so the runtime is fine.
          - platform: windows-latest
            args: "--target aarch64-pc-windows-msvc --features custom-protocol"
            rust-targets: "aarch64-pc-windows-msvc"
            win-arch: arm64
            win-exe-dir: target/aarch64-pc-windows-msvc/release
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf \
            build-essential curl wget file libssl-dev libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          # Cargo workspace is the repo ROOT (target/ lives there, not src-tauri/)
          workspaces: ". -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign) — the app-update root of trust, SEPARATE from
          # OS code-signing. REQUIRED once `bundle.createUpdaterArtifacts` is true:
          # the bundler signs each updater artifact with this key, and the installed
          # app verifies against `plugins.updater.pubkey` in tauri.conf.json. Add the
          # two repo secrets (see docs/adr/0011) BEFORE tagging the next release, or
          # the signing step fails. Empty ⇒ signing skipped (fine only while no
          # updater artifacts are produced).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS/Windows builds are UNSIGNED for now (that's OS code-signing, not
          # the updater key above). Do NOT set the APPLE_* signing env vars here
          # while the secrets are empty — tauri-action sees an (empty)
          # APPLE_CERTIFICATE as "signing requested" and fails on `security import`.
          # To enable notarized macOS builds later, add these repo secrets AND
          # re-add the matching env lines:
          #   APPLE_CERTIFICATE (base64 .p12), APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID.
        with:
          # Upload into the draft from create-release. Empty on manual dispatch →
          # tauri-action just builds (no release touched).
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          # Tine ships the NSIS installer on Windows → point latest.json at it (not
          # the MSI). tauri-action auto-generates + uploads latest.json + the .sig
          # files (uploadUpdaterJson / uploadUpdaterSignatures default true).
          updaterJsonPreferNsis: true

      # Portable Windows build: the compiled Tauri exe is already self-contained
      # (frontend + lsdoc-wasm are embedded; WebView2Loader is statically linked),
      # so "portable" is just that one exe, zipped. The NSIS installer we also
      # ship wraps this same binary; the portable zip skips the installer AND its
      # WebView2 bootstrapper — WebView2 is preinstalled on Windows 10/11, so this
      # runs for ~everyone, but a machine without the runtime won't launch it.
      # Only produced on a real tag release (nothing to upload on a manual
      # workflow_dispatch smoke test, where releaseId is empty).
      - name: Package + upload portable Windows zip
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          # A cross-target build (ARM64) outputs under target/<triple>/release/, a
          # native build (x64) under target/release/ — matrix.win-exe-dir carries the
          # right one. Tauri v2 may rename the main binary to productName ("Tine.exe");
          # the cargo bin name is "tine.exe". Pick whichever exists — and NOT the
          # secondary "tine-check.exe" helper binary.
          $dir = "${{ matrix.win-exe-dir }}"
          $exe = @("$dir/Tine.exe", "$dir/tine.exe") |
            Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) { throw "portable: main Tine exe not found under $dir" }
          $zip = "Tine_${version}_${{ matrix.win-arch }}-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zip -Force
          gh release upload $tag $zip --clobber --repo $env:GITHUB_REPOSITORY

      # Publish the release as soon as THIS leg's assets are up, so each platform's
      # installer appears the moment it finishes instead of everyone waiting for the
      # slowest leg. Idempotent: with max-parallel:1 the first finished leg flips the
      # draft to published, later legs re-assert it (a no-op) and just add their
      # assets to the now-public release. Only on a real tag (a manual dispatch has
      # no release to publish). A totally-failed release still never publishes (no
      # leg reaches this step), so the draft-on-failure safety is preserved.
      - name: Publish the release (drop assets as they build)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });

  # 2b) Android: build a SIGNED release APK and upload it to the draft release.
  #     The private signing key lives ONLY in encrypted repo secrets — never in the
  #     repo or on a build host (see docs/ANDROID-RELEASE.md). Add these once, on the
  #     machine that holds the .jks (Settings → Secrets, or `gh secret set`):
  #       ANDROID_KEYSTORE_BASE64    base64 of the .jks   (`base64 -w0 tine-release.jks`)
  #       ANDROID_KEYSTORE_PASSWORD  keystore password
  #       ANDROID_KEY_ALIAS          key alias (e.g. tine)
  #       ANDROID_KEY_PASSWORD       key password
  #     Until ANDROID_KEYSTORE_BASE64 is set this job SKIPS (succeeds, builds
  #     nothing), so it never blocks the desktop release.
  android:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # secrets can't be used in a job-level `if:`, so gate every real step on this.
      # `secrets.X != ''` evaluates to a boolean without ever printing the secret.
      - name: Detect signing secret
        id: sign
        run: echo "enabled=${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}" >> "$GITHUB_OUTPUT"

      - name: Note skip
        if: steps.sign.outputs.enabled != 'true'
        run: echo "::notice::ANDROID_KEYSTORE_BASE64 not set — skipping signed Android build. Add the ANDROID_* secrets to enable it."

      - uses: actions/setup-java@v4
        if: steps.sign.outputs.enabled == 'true'
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        if: steps.sign.outputs.enabled == 'true'
        with:
          node-version: 20
          cache: npm

      # Pinned to match the F-Droid build recipe EXACTLY (metadata/page.tine.app.yml
      # uses `rustup default 1.96.0`). Reproducible builds require the developer's
      # APK and F-Droid's rebuild to use the same compiler, so this must not drift
      # to `stable`. Bump both together.
      - uses: dtolnay/rust-toolchain@1.96.0
        if: steps.sign.outputs.enabled == 'true'
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        if: steps.sign.outputs.enabled == 'true'
        with:
          workspaces: ". -> target"

      # Match the local toolchain exactly (compileSdk 36; NDK 26.3.11579264).
      - name: Install Android SDK packages
        if: steps.sign.outputs.enabled == 'true'
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "platforms;android-35" \
            "build-tools;35.0.0" "ndk;26.3.11579264" "platform-tools" >/dev/null
          NDK="$ANDROID_SDK_ROOT/ndk/26.3.11579264"
          # Point EVERY NDK env var at 26.3 — incl. ANDROID_NDK_LATEST_HOME, which the
          # runner presets to a newer preinstalled NDK. Without this override, the
          # Android build linked with that newer NDK's clang/lld 21 instead of 26.3's
          # clang/lld 17, which is what F-Droid's recipe (`ndk: 26.3.11579264`) uses —
          # different linker ⇒ different .so layout ⇒ reproducibility verify fails.
          for v in NDK_HOME ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK_LATEST_HOME; do
            echo "$v=$NDK" >> "$GITHUB_ENV"
          done
          # Env vars alone are NOT enough: the .so is linked by the tauri CLI (gradle's
          # RustPlugin shells out to `tauri android build`), which resolved a NEWER
          # preinstalled NDK's clang/lld 21 despite the env pin. Delete every other NDK
          # so 26.3 is the ONLY one anything can find — exactly the local (clang 17)
          # condition. With ndkVersion pinned in app/build.gradle.kts, AGP won't
          # re-download its default.
          find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d ! -name "26.3.11579264" -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$ANDROID_SDK_ROOT/ndk-bundle" 2>/dev/null || true
          echo "NDKs remaining on runner:"; ls "$ANDROID_SDK_ROOT/ndk"
          # Fail loudly if 26.3's clang isn't the one that'll be used.
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version | head -1

      - name: Install JS deps
        if: steps.sign.outputs.enabled == 'true'
        run: npm ci

      # Decode the keystore + write the gitignored signing config the Gradle build
      # reads. Both are removed in the final step regardless of outcome.
      - name: Write signing config from secrets
        if: steps.sign.outputs.enabled == 'true'
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/tine-release.jks"
          {
            echo "storeFile=$RUNNER_TEMP/tine-release.jks"
            echo "storePassword=$KS_PASS"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASS"
          } > src-tauri/gen/android/keystore.properties

      # Stamp the APK's versionName/versionCode from tauri.conf.json so a version
      # bump always reaches the Android build (tauri.properties is autogenerated;
      # this makes the result deterministic regardless of whether the CLI resyncs
      # it). versionCode uses tauri's scheme: major*1e6 + minor*1e3 + patch.
      - name: Sync Android version from tauri.conf.json
        if: steps.sign.outputs.enabled == 'true'
        run: |
          v=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS=. read -r MA MI PA <<< "$v"
          code=$(( 10#$MA * 1000000 + 10#$MI * 1000 + 10#$PA ))
          printf '// THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY.\ntauri.android.versionName=%s\ntauri.android.versionCode=%s\n' "$v" "$code" \
            > src-tauri/gen/android/app/tauri.properties
          echo "Android version → $v (code $code)"

      # The desktop/Flatpak identifier is page.tine.Tine (Flathub forbids IDs ending
      # in .app), but Android deliberately keeps applicationId page.tine.app to protect
      # the F-Droid listing + installed users. `tauri android build` derives the Java
      # package path from tauri.conf.json's `identifier`, and the committed gen/android
      # project is page.tine.app — so with the desktop id in place the build looks for
      # java/page/tine/Tine and fails ("Project directory … does not exist"). Pin the
      # identifier back to page.tine.app for the Android build only (ephemeral checkout;
      # desktop jobs are unaffected). This is exactly how it built pre-rename (v0.5.0).
      - name: Pin Android identifier to page.tine.app
        if: steps.sign.outputs.enabled == 'true'
        run: |
          node -e "const f='./src-tauri/tauri.conf.json',c=require(f);c.identifier='page.tine.app';require('fs').writeFileSync(f,JSON.stringify(c,null,2)+'\n');"
          echo "Android identifier → $(node -p "require('./src-tauri/tauri.conf.json').identifier")"

      - name: Build signed Android APK
        if: steps.sign.outputs.enabled == 'true'
        # Reproducible build (F-Droid #reproducible): canonicalize build-location paths
        # so the native lib's module-id hash matches F-Droid's rebuild regardless of
        # where each ran. Must stay identical to the RUSTFLAGS in the F-Droid recipe
        # (metadata/page.tine.app.yml). Paired with codegen-units=1 (Cargo.toml) and the
        # commit-time __BUILD_TIME__ (vite.config.ts).
        run: |
          export RUSTFLAGS="--remap-path-prefix=$GITHUB_WORKSPACE=/build --remap-path-prefix=$HOME/.cargo=/cargo"
          npx tauri android build --target aarch64 --apk

      # On a manual dispatch (no tag) there is no release to attach to, so expose
      # the built APK as a workflow artifact instead — this is how the documented
      # reproducibility smoke-test inspects the CI-built native lib (compare its
      # libtine_lib.so against a local `ndk: 26.3.11579264` F-Droid-recipe build).
      - name: Upload Android APK as artifact (dispatch smoke-test)
        if: steps.sign.outputs.enabled == 'true' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-smoketest
          path: src-tauri/gen/android/**/release/*-release.apk
          if-no-files-found: error

      - name: Upload Android APK to the release
        if: steps.sign.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          # The signed artifact is app-universal-release.apk (the unsigned build
          # would end in -release-unsigned.apk, which this glob excludes).
          apk=$(find src-tauri/gen/android -path '*/release/*' -name '*-release.apk' | head -1)
          if [ -z "$apk" ]; then echo "no signed APK found"; exit 1; fi
          cp "$apk" "Tine_${version}_android-arm64.apk"
          gh release upload "$tag" "Tine_${version}_android-arm64.apk" --clobber --repo "$GITHUB_REPOSITORY"

      # Same incremental-publish as the desktop legs: flip the draft public once the
      # APK is up so it drops independently of the (slower) desktop builds.
      - name: Publish the release (drop the APK as it builds)
        if: steps.sign.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });

      - name: Remove signing material
        if: always()
        run: rm -f "$RUNNER_TEMP/tine-release.jks" src-tauri/gen/android/keystore.properties

  # Note: there is no final "publish-release" gate any more. Each build/android leg
  # publishes the release itself the moment its own assets are uploaded (see the
  # "Publish the release …" steps above), so installers drop as they are generated
  # rather than all waiting for the slowest platform. A run where every leg fails
  # never reaches those steps, so the release correctly stays an unpublished draft.
