name: ui-e2e

on:
  workflow_dispatch:
    inputs:
      linux_scenario:
        description: Optional single Linux scenario for focused debugging
        required: false
        default: ""
      windows_scenario:
        description: Optional single Windows scenario, or all, for focused debugging
        required: false
        default: ""

permissions:
  contents: read

jobs:
  linux-release:
    name: Linux x64 real-app release suite
    if: ${{ inputs.windows_scenario == '' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install native UI test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential libssl-dev \
            webkit2gtk-driver xvfb xauth xdotool openbox x11-utils weston
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: npm ci
      - name: Install browser used by the selection-wrap scenario
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Build production-protocol app
        run: cargo build --release --features custom-protocol --manifest-path src-tauri/Cargo.toml
      - name: Install Tauri WebDriver bridge
        run: cargo install tauri-driver --locked
      - name: Run complete Linux UI regression catalog
        env:
          E2E_ALLOW_SYNTHETIC_FOCUS: "1"
        run: |
          if [ -n "${{ inputs.linux_scenario }}" ]; then
            npm run e2e:linux:release -- --scenario=${{ inputs.linux_scenario }}
          else
            npm run e2e:linux:release
          fi
      - name: Upload Linux E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-linux-${{ github.run_attempt }}
          path: test-results/e2e/linux-release
          if-no-files-found: warn
          retention-days: 14

  windows-smoke:
    name: Windows x64 ${{ matrix.scenario }} real-app smoke
    if: ${{ inputs.linux_scenario == '' }}
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON((inputs.windows_scenario == '' || inputs.windows_scenario == 'all') && '["windows-core","og-parity-references","page-properties","page-trailing-block","pdf-logseq","print-security","tab-overflow"]' || format('["{0}"]', inputs.windows_scenario)) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: npm ci
      - run: npm run build
      - name: Build production-protocol app
        run: cargo build --release --features custom-protocol --manifest-path src-tauri/Cargo.toml
      - name: Install Edge WebDriver matching the hosted browser
        shell: pwsh
        run: |
          $edgeExe = "${env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe"
          if (-not (Test-Path $edgeExe)) { throw "Microsoft Edge not found at $edgeExe" }
          $version = (Get-Item $edgeExe).VersionInfo.ProductVersion
          $driverDir = "$env:RUNNER_TEMP\edgedriver"
          $zip = "$env:RUNNER_TEMP\edgedriver.zip"
          Invoke-WebRequest "https://msedgedriver.microsoft.com/$version/edgedriver_win64.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath $driverDir -Force
          $driverDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$driverDir\msedgedriver.exe" --version
      - name: Run Windows WebView2 smoke
        env:
          TINE_APP: ${{ github.workspace }}\target\release\tine.exe
        run: npm run e2e:windows:smoke -- --scenario=${{ matrix.scenario }}
      - name: Upload Windows E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-windows-${{ matrix.scenario }}-${{ github.run_attempt }}
          path: test-results/e2e/windows-smoke
          if-no-files-found: warn
          retention-days: 14
