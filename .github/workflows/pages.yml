# Deploy the static marketing site in website/ to GitHub Pages.
#
# ONE-TIME SETUP (required): repo Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". The workflow GITHUB_TOKEN can DEPLOY to Pages but
# cannot ENABLE Pages (that needs repo-admin scope it doesn't have — hence the
# "Resource not accessible by integration" error if Pages is off). So flip it on
# by hand once; after that every push to website/ deploys automatically.
# Until a custom domain is set it serves at https://<user>.github.io/tine/.
#
# Custom domain: add a `website/CNAME` file containing the bare domain (e.g.
# `tine.page`). With Actions-based Pages the CNAME must live IN the published
# artifact — setting it only in the repo's Pages UI gets wiped on the next deploy.
#
# Only runs when the site (or this workflow) changes, so it never competes with
# the app's CI/release builds.
name: pages

on:
  push:
    branches: [master]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
