# Checks on every push to master and every PR: frontend/type/Rust tests plus
# platform compile probes. The probes exist because Linux host tests cannot see
# Windows-only code or Android-specific libc declarations.
name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - run: npm ci

      - name: Flatpak offline npm sources are current
        run: node scripts/check-flatpak-node-sources.mjs

      - name: Flatpak offline Cargo sources are current
        run: node scripts/check-flatpak-cargo-sources.mjs

      - name: Release pipeline contract fixtures
        run: node scripts/test-release-pipeline.mjs

      - name: UI regression catalog and release evidence contracts
        run: |
          npm run check:regressions
          npm run check:release-readiness
          npm run blog:check

      - name: Canonical Guide/demo is generated and current
        run: npm run docs:check

      # The pin guard otherwise only runs inside `npm run build`, which fast CI
      # skips — a Cargo lsdoc bump with stale vendored WASM must fail HERE, not
      # at release-build time.
      - name: lsdoc WASM pin check
        run: node scripts/check-wasm-pin.mjs

      - name: lsdoc mldoc-oracle drift check
        run: node scripts/check-lsdoc-oracle-sync.mjs

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Frontend tests (vitest)
        run: npm test

      - name: Rust core tests
        run: cargo test -p tine-core

  # Compile platform-gated source on every change. Linux host tests do not see
  # either branch: Windows has its own cfg implementation, while Android's libc
  # declarations differ from desktop Linux even for the same syscall.
  windows-compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: npm ci
      - run: npm run build
      - name: Windows core tests (including junction filesystem behavior)
        run: cargo test -p tine-core
      - name: Windows Tauri shell compiles
        run: cargo check -p tine --features custom-protocol

  android-core-compile:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Android core compiles against Android libc declarations
        run: cargo check -p tine-core --target aarch64-linux-android

  # Same-machine A/B perf gate. The immutable anchor prevents small release-over-
  # release slowdowns from ratcheting the baseline; the previous release catches
  # abrupt regressions. All three builds run on this one runner, so CPU model is
  # not confused with code performance (docs/BENCH.md).
  bench:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Read performance baseline refs
        id: perf-policy
        shell: bash
        run: |
          echo "immutable=$(node -p "require('./scripts/bench-policy.json').immutableBaseline.ref")" >> "$GITHUB_OUTPUT"
          echo "previous=$(node -p "require('./scripts/bench-policy.json').previousRelease.ref")" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.perf-policy.outputs.immutable }}
          path: .bench/immutable

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.perf-policy.outputs.previous }}
          path: .bench/previous

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install candidate and baseline dependencies
        run: |
          npm ci
          npm ci --prefix .bench/immutable
          npm ci --prefix .bench/previous

      - name: Install bench browser (Playwright Chromium)
        run: npx playwright install --with-deps chromium

      - name: Build candidate and both baseline refs
        run: |
          npm run build
          npm --prefix .bench/immutable run build
          npm --prefix .bench/previous run build

      - name: Measure immutable baseline, previous release, and candidate
        run: |
          mkdir -p test-results/perf
          npm --prefix .bench/immutable run bench -- --update
          npm --prefix .bench/previous run bench -- --update
          npm run bench -- --update --output test-results/perf/candidate.json

      - name: Enforce metric-specific A/B budgets
        run: |
          node scripts/check-bench-ab.mjs \
            --policy scripts/bench-policy.json \
            --candidate test-results/perf/candidate.json \
            --immutable .bench/immutable/scripts/bench-baseline.json \
            --previous .bench/previous/scripts/bench-baseline.json

      - name: Upload performance measurements
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-ab-${{ github.run_attempt }}
          path: |
            test-results/perf/candidate.json
            .bench/immutable/scripts/bench-baseline.json
            .bench/previous/scripts/bench-baseline.json
