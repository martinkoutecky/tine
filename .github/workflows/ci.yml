# Fast checks on every push to master and every PR: typecheck + frontend tests +
# the Rust core's tests. Deliberately does NOT build the Tauri shell (no webkit
# deps needed) — `tine-core` is GUI-free, so this stays cheap and quick. The
# full cross-platform build lives in release.yml.
name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - run: npm ci

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Frontend tests (vitest)
        run: npm test

      - name: Rust core tests
        run: cargo test -p tine-core
