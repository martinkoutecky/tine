[workspace]
members = ["crates/tine-core", "src-tauri"]
resolver = "2"

[workspace.package]
version = "0.1.4"
edition = "2021"
license = "AGPL-3.0-only"
authors = ["Martin Koutecký"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
