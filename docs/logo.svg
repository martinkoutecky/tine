<svg width="300" height="84" viewBox="0 0 300 84" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tine">
  <!-- Mark: a fork's tines merging into a stem — an outline that branches. -->
  <g stroke="#10b981" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M16 16 V36" />
    <path d="M32 16 V36" />
    <path d="M48 16 V36" />
    <path d="M16 36 H48" />
    <path d="M32 36 V68" />
  </g>
  <!-- Wordmark -->
  <text x="78" y="55" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="46" font-weight="700" fill="#10b981" letter-spacing="-1">Tine</text>
</svg>
